services:
  subtrack:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: subtrack
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET:-}
      - DATABASE_PATH=/app/data/subtrack.db
      - APP_ENV=production
    volumes:
      - subtrack_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  subtrack_data:
    driver: local
